# 전역 설정
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager 설정
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# 규칙 파일 로드
rule_files:
  - '/etc/prometheus/rules/*.yml'

# 메트릭 수집 대상(Scrape Target) 목록
scrape_configs:
  ################################################################################
  # 기본 모니터링 (프로메테우스 자신, Docker 컨테이너)
  ################################################################################
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9099']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  ################################################################################
  # 서버 OS 및 하드웨어 모니터링 (Node Exporter)
  ################################################################################
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['<VM_SERVER_IP>:9100']
        labels:
          nodename: 'vm-server-01'
      - targets: ['<DEV_SERVER_IP>:9100']
        labels:
          nodename: 'dev-server'
      - targets: ['<GPU_SERVER_IP>:9100']
        labels:
          nodename: 'dev-gpu-server'
      - targets: ['<GITLAB_SERVER_IP>:9100']
        labels:
          nodename: 'gitlab-server'
      - targets: ['<GITLAB_RUNNER_IP>:9100']
        labels:
          nodename: 'gitlab-runner'
      - targets: ['<ERP_SERVER_IP>:9100']
        labels:
          nodename: 'ERP-server'

  ################################################################################
  # 가상화 플랫폼 모니터링 (KVM/Libvirt)
  ################################################################################
  - job_name: 'libvirt-exporter'
    static_configs:
      - targets:
        - '<DEV_SERVER_IP>:9177'
        - '<GPU_SERVER_IP>:9177'
        - '<VM_SERVER_IP>:9177'

  ################################################################################
  # 서비스 및 엔드포인트 가용성 모니터링 (Blackbox Exporter)
  ################################################################################
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - https://your-service-domain.com
        - https://your-dev-service.com
        - https://your-erp-service.com
        - http://<PUBLIC_IP_ADDRESS>
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: 'blackbox-tcp'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
        - '<YOUR_MQTT_BROKER_IP>:1883'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: 'blackbox-icmp'
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
        - <ICMP_TARGET_IP_1>
        - <ICMP_TARGET_IP_2>
        - <ICMP_TARGET_IP_3>
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  ################################################################################
  # 네트워크 장비 모니터링 (SNMP Exporter)
  ################################################################################
  - job_name: 'snmp'
    scrape_interval: 1m
    scrape_timeout: 50s
    params:
      module: [if_mib_standard] # 기본 모듈
    static_configs:
      - targets:
        # --- 스위치 ---
        - <CISCO_SWITCH_IP_1>
        - <CISCO_SWITCH_IP_2>
        - <NETGEAR_SWITCH_IP_1>
        # --- 라우터/AP ---
        - <ROUTER_IP_1>
        - <ARUBA_AP_IP_1>
        - <ORBI_AP_IP_1>
        # --- iDRAC (idrac 모듈로 relabel 됨) ---
        - <ERP_IDRAC_IP>
        - <GPU_IDRAC_IP>
        - <DEV_IDRAC_IP>
        - <VM_IDRAC_IP>

    relabel_configs:
      # iDRAC 장비 IP 대역(예: 192.168.100.15x)인 경우, module을 'idrac'으로 변경
      - source_labels: [__address__]
        regex: '192\.168\.100\.15.*' # <-- 예시 IP 대역, 실제 환경에 맞게 수정
        target_label: __param_module
        replacement: 'idrac'

      # Iptime 장비 IP 대역(예: 192.168.102.x)인 경우, module을 'if_mib_iptime'으로 변경
      - source_labels: [__address__]
        regex: '192\.168\.102\..*' # <-- 예시 IP 대역, 실제 환경에 맞게 수정
        target_label: __param_module
        replacement: 'if_mib_iptime'

      # --- 아래는 모든 타겟에 공통으로 적용되는 설정 ---
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        # snmp-exporter가 실행 중인 호스트의 IP와 포트로 변경
        replacement: <YOUR_SNMP_EXPORTER_HOST_IP>:9116

  ################################################################################
  # 애플리케이션 및 서비스 모니터링 (HAProxy, GitLab 등)
  ################################################################################
  - job_name: 'haproxy'
    static_configs:
      - targets: ['haproxy-exporter:9101']

  - job_name: 'gitlab'
    static_configs:
      - targets:
        - '<GITLAB_SERVER_IP>:9100'  # Node
        - '<GITLAB_SERVER_IP>:9121'  # Redis
        - '<GITLAB_SERVER_IP>:9187'  # Postgres
        - '<GITLAB_SERVER_IP>:9168'  # Puma
        - '<GITLAB_SERVER_IP>:9236'  # Gitaly
        - '<GITLAB_SERVER_IP>:9229'  # Workhorse
        - '<GITLAB_SERVER_IP>:8082'  # Sidekiq
        - '<GITLAB_RUNNER_IP>:9252'  # gitlab-runner