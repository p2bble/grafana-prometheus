groups:
  - name: HostStatusAlerts
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "인스턴스 다운: {{ $labels.instance }}"
          description: "{{ $labels.job }} 잡의 {{ $labels.instance }} 인스턴스가 1분 이상 다운되었습니다."

      - alert: HighCpuUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "높은 CPU 사용량: {{ $labels.instance }}"
          description: "{{ $labels.instance }}의 CPU 사용량이 5분 동안 80%를 초과했습니다. (현재 값: {{ $value | printf `%.2f` }}%)"

      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "높은 메모리 사용량: {{ $labels.instance }}"
          description: "{{ $labels.instance }}의 메모리 사용량이 5분 동안 85%를 초과했습니다. (현재 값: {{ $value | printf `%.2f` }}%)"

      - alert: HighSwapUsage
        expr: (1 - node_memory_SwapFree_bytes / node_memory_SwapTotal_bytes) * 100 > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "높은 Swap 사용량: {{ $labels.instance }}"
          description: "{{ $labels.instance }}의 Swap 사용량이 10분 동안 50%를 초과했습니다. (현재 값: {{ $value | printf `%.1f` }}%) 메모리 부족 여부 확인 필요."

      - alert: LowDiskSpace
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "디스크 공간 부족: {{ $labels.instance }}"
          description: "{{ $labels.instance }}의 루트(/) 파티션 디스크 남은 공간이 10% 미만입니다. (현재 값: {{ $value | printf `%.2f` }}%)"

      - alert: HighSystemLoad
        expr: node_load1 / count by(instance) (node_cpu_seconds_total{mode="idle"}) > 2.0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "높은 시스템 로드: {{ $labels.instance }}"
          description: "{{ $labels.instance }}의 1분 로드 평균이 CPU 코어당 2.0을 초과했습니다. (현재 값: {{ $value | printf `%.2f` }})"

  - name: DiskSpaceAlerts
    rules:
      - alert: GitlabBackupDiskHigh
        expr: |
          (node_filesystem_size_bytes{instance="172.19.100.21:9100", mountpoint="/data/docker/gitlab/backups"}
          - node_filesystem_avail_bytes{instance="172.19.100.21:9100", mountpoint="/data/docker/gitlab/backups"})
          / node_filesystem_size_bytes{instance="172.19.100.21:9100", mountpoint="/data/docker/gitlab/backups"} * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GitLab 백업 디스크 사용량 높음"
          description: "gitlab-srv 백업 디스크(/data/docker/gitlab/backups)가 80%를 초과했습니다. (현재: {{ $value | printf `%.1f` }}%)"

      - alert: GitlabBackupDiskCritical
        expr: |
          (node_filesystem_size_bytes{instance="172.19.100.21:9100", mountpoint="/data/docker/gitlab/backups"}
          - node_filesystem_avail_bytes{instance="172.19.100.21:9100", mountpoint="/data/docker/gitlab/backups"})
          / node_filesystem_size_bytes{instance="172.19.100.21:9100", mountpoint="/data/docker/gitlab/backups"} * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "GitLab 백업 디스크 위험 수위"
          description: "gitlab-srv 백업 디스크(/data/docker/gitlab/backups)가 90%를 초과했습니다. 즉시 정리 필요. (현재: {{ $value | printf `%.1f` }}%)"

      - alert: NasStorageLow
        expr: node_filesystem_avail_bytes{mountpoint="/storage"} / node_filesystem_size_bytes{mountpoint="/storage"} * 100 < 15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "NAS 스토리지 여유 공간 부족: {{ $labels.instance }}"
          description: "NAS(/storage) 여유 공간이 15% 미만입니다. (현재: {{ $value | printf `%.1f` }}%) 불필요한 데이터 정리 필요."

      - alert: NasStorageCritical
        expr: node_filesystem_avail_bytes{mountpoint="/storage"} / node_filesystem_size_bytes{mountpoint="/storage"} * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "NAS 스토리지 위험 수위: {{ $labels.instance }}"
          description: "NAS(/storage) 여유 공간이 10% 미만입니다. (현재: {{ $value | printf `%.1f` }}%) 즉시 조치 필요."

  - name: BackupAlerts
    rules:
      - alert: GitlabRsyncFailed
        expr: gitlab_rsync_success == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "GitLab 1차 rsync 실패"
          description: "gitlab-srv NAS→로컬 rsync가 실패했습니다. /var/log/gitlab-rsync.log 확인 필요."

      - alert: GitlabSecondaryRsyncFailed
        expr: gitlab_secondary_rsync_success == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "GitLab 2차 rsync 실패"
          description: "gitlab-srv 로컬→NAS 2차 rsync가 실패했습니다. /var/log/gitlab-secondary-rsync.log 확인 필요."

      - alert: GitlabRsyncStale
        expr: time() - gitlab_rsync_last_timestamp > 90000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GitLab rsync 25시간 이상 미실행"
          description: "마지막 1차 rsync 이후 25시간 이상 경과했습니다. crontab 또는 NAS 연결 확인 필요."

      - alert: GitlabSecondaryRsyncStale
        expr: time() - gitlab_secondary_rsync_last_timestamp > 90000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GitLab 2차 rsync 25시간 이상 미실행"
          description: "마지막 2차 rsync 이후 25시간 이상 경과했습니다."

  - name: SslCertAlerts
    rules:
      - alert: SslCertExpiringSoon
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 7
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "SSL 인증서 7일 이내 만료: {{ $labels.instance }}"
          description: "{{ $labels.instance }} 인증서가 {{ $value | humanizeDuration }} 후 만료됩니다."

      - alert: SslCertExpiryWarning
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 30
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SSL 인증서 30일 이내 만료: {{ $labels.instance }}"
          description: "{{ $labels.instance }} 인증서가 {{ $value | humanizeDuration }} 후 만료됩니다."

  - name: ServiceBackupAlerts
    rules:
      - alert: SonarqubeBackupFailed
        expr: sonarqube_backup_success == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "SonarQube DB 백업 실패"
          description: "vm-server-01 SonarQube PostgreSQL 백업이 실패했습니다. /var/log/sonarqube-backup.log 확인 필요."

      - alert: SonarqubeBackupStale
        expr: time() - sonarqube_backup_last_timestamp > 90000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SonarQube 백업 25시간 이상 미실행"
          description: "마지막 SonarQube 백업 이후 25시간 이상 경과했습니다."

      - alert: N8nBackupFailed
        expr: n8n_backup_success == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "n8n 백업 실패"
          description: "vm-server-01 n8n 데이터 백업이 실패했습니다. /var/log/n8n-backup.log 확인 필요."

      - alert: N8nBackupStale
        expr: time() - n8n_backup_last_timestamp > 90000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "n8n 백업 25시간 이상 미실행"
          description: "마지막 n8n 백업 이후 25시간 이상 경과했습니다."

      - alert: GraylogBackupFailed
        expr: graylog_backup_success == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Graylog 백업 실패"
          description: "vm-server-01 Graylog(MongoDB+OpenSearch) 백업이 실패했습니다. /var/log/graylog-backup.log 확인 필요."

      - alert: GraylogBackupStale
        expr: time() - graylog_backup_last_timestamp > 691200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Graylog 백업 8일 이상 미실행"
          description: "마지막 Graylog 백업 이후 8일 이상 경과했습니다. (주간 백업 스케줄 기준) crontab 확인 필요."

      - alert: VmBackupFailed
        expr: vm_backup_success == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "VM 백업 실패 ({{ $labels.vm }})"
          description: "{{ $labels.vm }} VM 백업이 실패했습니다. /var/log/vm-backup.log 확인 필요."

      - alert: VmBackupStale
        expr: time() - vm_backup_last_timestamp > 691200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VM 백업 8일 이상 미실행 ({{ $labels.vm }})"
          description: "{{ $labels.vm }} 마지막 VM 백업 이후 8일 이상 경과했습니다. (주간 백업 스케줄 기준)"

      - alert: ServerFileBackupFailed
        expr: server_file_backup_success == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "서버 파일 백업 실패 ({{ $labels.server }})"
          description: "{{ $labels.server }} 서버 파일(/etc, /usr/local/bin, /data/docker) 백업이 실패했습니다. /var/log/server-file-backup.log 확인 필요."

      - alert: ServerFileBackupStale
        expr: time() - server_file_backup_last_timestamp > 90000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "서버 파일 백업 25시간 이상 미실행 ({{ $labels.server }})"
          description: "{{ $labels.server }} 마지막 파일 백업 이후 25시간 이상 경과했습니다."
